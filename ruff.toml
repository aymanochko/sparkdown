# Ruff configuration for SparkDown
# https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py38"

# Enable specific rules
lint.select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

# Ignore specific rules
lint.ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "C901",   # too complex
]

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    ".pytest_cache",
    "build",
    "dist",
    "*.egg-info",
    ".venv",
    "venv",
]

# Line length
line-length = 100

[lint.per-file-ignores]
"tests/*" = ["B011"]

[format]
# Use default quote style
quote-style = "double"
